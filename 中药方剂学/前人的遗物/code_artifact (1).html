<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>方剂专属抽背模拟器</title>
    <style>
        :root {
            --primary: #c0392b;     /* 中医红 */
            --secondary: #e67e22;   /* 暖橙 */
            --bg-color: #f4f1ea;    /* 宣纸底色 */
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --accent-blue: #2980b9;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
            width: 100%;
            max-width: 420px;
        }
        .header h1 {
            color: var(--primary);
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            letter-spacing: 1px;
        }
        .progress-container {
            width: 100%;
            background-color: #e0dcd3;
            border-radius: 10px;
            height: 8px;
            margin-top: 15px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--secondary);
            width: 0%;
            transition: width 0.3s ease;
        }
        
        /* 卡片主体 */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            border: 1px solid #eae5d9;
            width: 100%;
            max-width: 420px;
            min-height: 380px;
            padding: 30px 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            position: relative;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card:active {
            transform: scale(0.99);
            transition: transform 0.1s;
        }

        /* 题目 */
        .question {
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--primary);
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #eae5d9;
            line-height: 1.4;
        }

        /* 答案区 */
        .answer {
            width: 100%;
            display: none;
            line-height: 1.6;
            animation: fadeIn 0.3s ease-out;
            flex-grow: 1;
        }
        .answer.show {
            display: block;
        }

        /* 结构化样式 */
        .ans-badge {
            display: inline-block;
            background-color: var(--secondary);
            color: white;
            font-size: 0.85rem;
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .ans-section {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--accent-blue);
            margin-top: 20px;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 4px solid var(--accent-blue);
            background: rgba(41, 128, 185, 0.05);
            padding-top: 4px;
            padding-bottom: 4px;
            border-radius: 0 6px 6px 0;
        }
        .ans-item-title {
            font-weight: bold;
            color: #34495e;
            margin-top: 12px;
            position: relative;
            padding-left: 18px;
            font-size: 1.05rem;
        }
        .ans-item-title::before {
            content: '🌿';
            position: absolute;
            left: -2px;
            font-size: 0.9rem;
            top: 2px;
        }
        .ans-desc {
            color: #555;
            padding-left: 18px;
            margin-top: 4px;
            font-size: 0.95rem;
            text-align: justify;
        }
        .ans-text {
            color: #444;
            margin-top: 8px;
            font-size: 1rem;
            text-align: justify;
        }

        /* 底部操作区 */
        .controls-bottom {
            width: 100%;
            max-width: 420px;
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        button {
            flex: 1;
            padding: 16px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            background-color: var(--secondary);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.2);
            transition: all 0.2s;
            touch-action: manipulation;
            letter-spacing: 1px;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 4px rgba(230, 126, 34, 0.2);
        }
        button.show-btn {
            background-color: #27ae60; 
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.2);
        }
        
        .counter-text {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .toast {
            position: fixed;
            top: 20px;
            background: rgba(44, 62, 80, 0.9);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="header">

        // --- 解析与结构化逻辑 ---
        function parseDeck(text) {
            const blocks = text.split('%').filter(b => b.trim().length > 0);
            return blocks.map(block => {
                const lines = block.trim().split('\n');
                if (lines.length < 2) return null;
                const q = lines[0].trim();
                const a = lines.slice(1).join('\n').trim();
                return { q, a };
            }).filter(item => item !== null);
        }

        const sectionKeywords = ['方剂组成', '功效', '主治', '辩证要点', '四君子汤和理中汤'];

        function formatAnswer(rawText) {
            const lines = rawText.split('\n').map(l => l.trim()).filter(l => l);
            let html = '';
            
            lines.forEach((line, index) => {
                // 1. 识别顶部的分类标签 (通常带有 药/方 字且很短)
                if (index === 0 && (line.endsWith('药') || line.endsWith('方')) && line.length <= 10) {
                    html += `<div class="ans-badge">${line}</div>`;
                    return;
                }

                // 2. 识别模块标题 (如 主治, 功效)
                let isSection = sectionKeywords.some(kw => line === kw || line.includes(kw));
                if (isSection) {
                    html += `<div class="ans-section">${line}</div>`;
                    return;
                }

                // 3. 区分 "药材名" 和 "解释内容"
                // 规则：短句(<=8字) 且没有逗号句号，大概率是药材/项目名
                const hasPunctuation = /[，。；,;]/.test(line);
                if (line.length <= 8 && !hasPunctuation) {
                    html += `<div class="ans-item-title">${line}</div>`;
                } else {
                    // 如果前面是一个标题，这就是描述；否则作为普通正文段落
                    if(html.endsWith('</div>') && html.includes('ans-item-title') && !html.endsWith('ans-desc</div>')) {
                         html += `<div class="ans-desc">${line}</div>`;
                    } else {
                         html += `<div class="ans-text">${line}</div>`;
                    }
                }
            });

            return html;
        }

        // --- 应用状态与逻辑 ---
        let fullDeck = parseDeck(rawData);
        let currentQueue = [];
        let totalQuestions = fullDeck.length;

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        function updateUI() {
            const doneCount = totalQuestions - currentQueue.length;
            document.getElementById('counterText').innerText = `已复习: ${doneCount} / 总计: ${totalQuestions} 题`;
            
            // 更新进度条
            const progress = (doneCount / totalQuestions) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function loadNextQuestion() {
            if (currentQueue.length === 0) {
                currentQueue = shuffle(fullDeck);
                if(totalQuestions > 0) showToast();
            }

            const cardData = currentQueue.pop();
            
            document.getElementById('questionText').innerText = cardData.q;
            document.getElementById('answerText').innerHTML = formatAnswer(cardData.a);
            
            // 重置卡片状态为隐藏答案
            document.getElementById('answerText').classList.remove('show');
            document.getElementById('showBtn').innerText = '查看解析';
            document.getElementById('showBtn').style.backgroundColor = '#27ae60'; // 恢复绿色
            
            updateUI();
        }

        function toggleCard() {
            const ans = document.getElementById('answerText');
            const btn = document.getElementById('showBtn');
            if (ans.classList.contains('show')) {
                ans.classList.remove('show');
                btn.innerText = '查看解析';
                btn.style.backgroundColor = '#27ae60'; // 绿色
            } else {
                ans.classList.add('show');
                btn.innerText = '收起解析';
                btn.style.backgroundColor = '#e74c3c'; // 红色，提示收起
            }
        }

        // --- 初始化 ---
        function init() {
            // 事件绑定，阻止冒泡冲突
            const card = document.getElementById('flashcard');
            const showBtn = document.getElementById('showBtn');
            const nextBtn = document.getElementById('nextBtn');

            card.addEventListener('click', toggleCard);
            
            showBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleCard();
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                loadNextQuestion();
            });

            // 首次发牌
            currentQueue = shuffle(fullDeck);
            loadNextQuestion();
            // 第一题进度条修正（显示为0进度）
            currentQueue.push(currentQueue[0]); // 障眼法，让进度条首题为0
            currentQueue.pop();
            updateUI();
            document.getElementById('progressBar').style.width = `0%`; 
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
