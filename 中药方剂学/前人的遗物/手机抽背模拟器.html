        }

            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border-radius: 10px;
            border: 2px solid var(--primary-color);
            background-color: white;
            color: var(--text-dark);
            outline: none;
            box-shadow: 0 2px 5px rgba(243, 156, 18, 0.2);
            appearance: none;
            -webkit-appearance: none;
        }
        .card {
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            min-height: 250px;
            padding: 25px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .card:active {
            transform: scale(0.98);
        }
        .question {
            font-size: 1.6rem;
            font-weight: bold;
            color: #e74c3c;
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        .answer {
            font-size: 1.2rem;
            color: #555;
            white-space: pre-wrap;
            text-align: left;
            width: 100%;
            display: none;
            border-top: 2px dashed #fce3b3;
            padding-top: 20px;
            line-height: 1.5;
            animation: fadeIn 0.4s ease-in-out;
        }
        .answer.show {
            display: block;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
        }
        button {
            flex: 1;
            padding: 15px;
            font-size: 1.1rem;
            border: none;
            border-radius: 12px;
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(243, 156, 18, 0.3);
            transition: all 0.2s;
        }

            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(243, 156, 18, 0.3);
        }
        button.show-btn {
            background-color: #3498db;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3);
        }
        button.show-btn:active {
            box-shadow: 0 2px 3px rgba(52, 152, 219, 0.3);
        }
        .counter {
            margin-top: 15px;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

        function parseDeck(rawText) {
            const blocks = rawText.split('%').filter(b => b.trim().length > 0);
            return blocks.map(block => {
                const lines = block.trim().split(/\r?\n/);
                const q = lines[0].trim();
                const a = lines.slice(1).join('\n').trim();
                return { q, a };
            }).filter(item => item.q && item.a);
        }

        const decks = {
            fangji: parseDeck(fangjiData),
            zhongyao: parseDeck(zhongyaoData)
        };

        let currentDeck = [];
        let currentItem = null;

        function init() {
            document.getElementById('deckSelect').addEventListener('change', (e) => {
                currentDeck = decks[e.target.value];
                document.getElementById('counterText').innerText = `当前题库共 ${currentDeck.length} 题`;
                nextQuestion();
            });
            currentDeck = decks['fangji'];
            document.getElementById('counterText').innerText = `当前题库共 ${currentDeck.length} 题`;
            nextQuestion();
        }

        function nextQuestion() {
            if(currentDeck.length === 0) return;
            const randomIndex = Math.floor(Math.random() * currentDeck.length);
            currentItem = currentDeck[randomIndex];

            document.getElementById('questionText').innerText = currentItem.q;
            document.getElementById('answerText').innerText = currentItem.a;
            
            // 隐藏答案
            document.getElementById('answerText').classList.remove('show');
            document.getElementById('showBtn').innerText = '看答案';
        }

        function toggleAnswer() {
            const ans = document.getElementById('answerText');
            const btn = document.getElementById('showBtn');
            if (ans.classList.contains('show')) {
                ans.classList.remove('show');
                btn.innerText = '看答案';
            } else {
                ans.classList.add('show');
                btn.innerText = '收起答案';
            }
        }

        window.onload = init;
    </script>
