        // --- 核心逻辑 ---
        function parseDeck(text) {
            const blocks = text.split('%').filter(b => b.trim().length > 0);
            return blocks.map(block => {
                const lines = block.trim().split(/\r?\n/);
                if (lines.length < 2) return null;
                const q = lines[0].trim();
                const a = lines.slice(1).join('\n').trim();
                return { q, a };
            }).filter(item => item !== null);
        }

        const sectionKeywords = ['方剂组成', '功效', '主治', '辩证要点', '四君子汤和理中汤'];

        function formatAnswer(rawText) {
            const lines = rawText.split(/\r?\n/).map(l => l.trim()).filter(l => l);
            let html = '';
            
            lines.forEach((line, index) => {
                if (index === 0 && (line.endsWith('药') || line.endsWith('方')) && line.length <= 10) {
                    html += `<div class="ans-badge">${line}</div>`;
                    return;
                }
                let isSection = sectionKeywords.some(kw => line === kw || line.includes(kw));
                if (isSection) {
                    html += `<div class="ans-section">${line}</div>`;
                    return;
                }
                const hasPunctuation = /[，。；,;]/.test(line);
                if (line.length <= 8 && !hasPunctuation) {
                    html += `<div class="ans-item-title">${line}</div>`;
                } else {
                    if(html.endsWith('</div>') && html.includes('ans-item-title') && !html.endsWith('ans-desc</div>')) {
                         html += `<div class="ans-desc">${line}</div>`;
                    } else {
                         html += `<div class="ans-text">${line}</div>`;
                    }
                }
            });
            return html;
        }

        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        const allDecks = {
            fangji: parseDeck(fangjiRaw),
            zhongyao: parseDeck(zhongyaoRaw)
        };

        let currentDeckId = 'fangji';
        let currentQueue = [];
        let totalCount = 0;

        function showToast() {
            const t = document.getElementById('toast');
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }

        function updateUI() {
            const done = totalCount - currentQueue.length;
            document.getElementById('counterText').innerText = `已复习: ${done} / 总计: ${totalCount} 题`;
            const progress = (done / totalCount) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
        }

        function loadDeck(id) {
            currentDeckId = id;
            currentQueue = shuffle(allDecks[id]);
            totalCount = currentQueue.length;
            loadNextQuestion();
        }

        function loadNextQuestion() {
            if (currentQueue.length === 0) {
                currentQueue = shuffle(allDecks[currentDeckId]);
                showToast();
            }
            const item = currentQueue.pop();
            document.getElementById('questionText').innerText = item.q;
            document.getElementById('answerText').innerHTML = formatAnswer(item.a);
            document.getElementById('answerText').classList.remove('show');
            document.getElementById('showBtn').innerText = '查看解析';
            document.getElementById('showBtn').style.backgroundColor = '#27ae60';
            updateUI();
        }

        function toggleAnswer() {
            const ans = document.getElementById('answerText');
            const btn = document.getElementById('showBtn');
            if (ans.classList.contains('show')) {
                ans.classList.remove('show');
                btn.innerText = '查看解析';
                btn.style.backgroundColor = '#27ae60';
            } else {
                ans.classList.add('show');
                btn.innerText = '收起解析';
                btn.style.backgroundColor = '#e74c3c';
            }
        }

        function init() {
            document.getElementById('flashcard').addEventListener('click', toggleAnswer);
            document.getElementById('showBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                toggleAnswer();
            });
            document.getElementById('nextBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                loadNextQuestion();
            });
            document.getElementById('deckSelect').addEventListener('change', (e) => {
                loadDeck(e.target.value);
            });

            loadDeck('fangji');
            // 修正初始进度条
            document.getElementById('progressBar').style.width = '0%';
        }

        window.onload = init;
    </script>
