<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>中药方剂翻转记忆卡</title>
    <style>
        :root {
            --primary-color: #4a7c59;
            --bg-color: #f4f7f6;
            --card-front-bg: #ffffff;
            --card-back-bg: #e9f5ee;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft YaHei";
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { color: var(--primary-color); }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        select {
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background-color: transparent;
            width: 100%;
            height: 380px;
            perspective: 1000px;
            cursor: pointer;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
        }
        .card-front {
            background-color: var(--card-front-bg);
            color: black;
            justify-content: center;
        }
        .card-back {
            background-color: var(--card-back-bg);
            color: #333;
            transform: rotateY(180deg);
            text-align: left;
        }
        .card-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; color: var(--primary-color); }
        .card-type { font-size: 14px; color: #666; margin-bottom: 5px; }
        .card-label { font-weight: bold; color: var(--primary-color); margin-top: 10px; border-bottom: 1px solid #ddd; }
        .card-list { margin: 5px 0; padding-left: 20px; font-size: 14px; }
        .card-notes { font-size: 13px; color: #555; margin-top: 15px; font-style: italic; white-space: pre-wrap; border-top: 1px dashed #ccc; padding-top: 10px; }
        
        /* 移动端优化 */
        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <h1>🌿 中药方剂翻转记忆卡</h1>
    
    <div class="controls">
        <label for="category-filter">筛选大类：</label>
        <select id="category-filter">
            <option value="all">全部</option>
        </select>
        <span id="stats"></span>
    </div>

    <div class="container" id="card-container"></div>

    <script>

"温中散寒方", "组成": ["桂心", "干姜", "益智仁", "砂仁", "肉豆蔻", "青皮", "陈皮", "厚朴", "当归", "五味子", "白术"], "君药": [], "臣药": [], "佐药": [], "使药": [], "name": "桂心散", "notes": ""}, {"type": "方剂", "功效": "解肌发表", "大类": "解表方", "子类": "辛温解表", "组成": ["桂枝", "白芍", "生姜", "大枣", "甘草"], "君药": ["桂枝"], "臣药": ["白芍"], "佐药": ["生姜", "大枣"], "使药": ["甘草"], "name": "桂枝汤", "notes": ""}, {"type": "方剂", "大类": "理气方", "子类": "行气方", "组成": ["青皮", "陈皮", "厚朴", "槟榔", "当归", "桂心", "茴香", "细辛", "白芷"], "君药": [], "臣药": [], "佐药": [], "使药": [], "name": "橘皮散", "notes": ""}, {"type": "方剂", "大类": "化痰止咳平喘方", "子类": "止咳平喘方", "组成": ["紫菀", "百部", "白前", "桔梗", "陈皮", "荆芥", "甘草"], "君药": [], "臣药": [], "佐药": [], "使药": [], "name": "止咳散", "notes": ""}, {"type": "方剂", "大类": "清热方", "子类": "气血两清", "组成": ["生石膏", "犀角", "知母", "地黄"], "君药": ["生石膏", "犀角"], "臣药": ["知母", "地黄"], "name": "清瘟败毒散", "notes": ""}, {"type": "方剂", "大类": "清热方", "子类": "清血分热", "组成": ["犀角", "生地", "玄参", "麦冬", "黄连", "银花", "连翘", "竹叶心", "丹参"], "君药": ["犀角"], "臣药": ["生地", "玄参", "麦冬"], "佐药": ["黄连", "银花", "连翘", "竹叶心"], "使药": ["丹参"], "name": "清营汤", "notes": ""}, {"type": "方剂", "大类": "温里方", "子类": "温中散寒方", "组成": ["干姜", "党参", "白术", "甘草"], "君药": [], "臣药": [], "佐药": [], "使药": [], "name": "理中汤", "notes": ""}, {"type": "方剂", "大类": "清热方", "子类": "清脏腑热", "组成": ["白头翁", "黄连", "黄柏", "秦皮"], "君药": ["白头翁"], "臣药": ["黄连", "黄柏"], "佐药": ["秦皮"], "使药": ["秦皮"], "name": "白头翁汤", "notes": ""}, {"type": "方剂", "大类": "清热方", "子类": "清气分热", "组成": ["生石膏", "知母", "粳米", "甘草"], "君药": ["生石膏"], "臣药": ["知母"], "佐药": ["粳米"], "使药": ["甘草"], "name": "白虎汤", "notes": ""}, {"type": "方剂", "大类": "温里方", "子类": "温经止痛方", "组成": ["茴香", "肉桂", "肉豆蔻", "巴戟天", "白附子", "藁本", "白术", "木通"], "君药": [], "臣药": [], "佐药": [], "使药": [], "name": "茴香散", "notes": ""}, {"type": "方剂", "大类": "解表方", "子类": "辛温解表", "组成": ["荆芥", "防风", "羌活", "独活", "川芎", "柴胡", "茯苓", "前胡", "桔梗", "枳壳", "甘草"], "君药": ["荆芥", "防风"], "臣药": ["羌活", "独活", "川芎", "柴胡"], "佐药": ["茯苓", "前胡", "桔梗", "枳壳"], "使药": ["甘草"], "name": "荆防败毒散", "notes": ""}, {"type": "方剂", "大类": "泻下方", "子类": "攻下方", "组成": ["大黄", "芒硝", "甘草"], "君药": ["大黄"], "臣药": ["芒硝"], "佐药": ["甘草"], "使药": ["甘草"], "name": "调胃承气汤", "notes": ""}, {"type": "方剂", "功效": "清热解毒", "大类": "解表方", "子类": "辛凉解表", "组成": ["金银花、连翘", "薄荷", "荆芥", "淡豆豉", "桔梗", "牛蒡子", "竹叶", "芦根", "甘草"], "君药": ["金银花、连翘"], "臣药": ["薄荷", "荆芥", "淡豆豉"], "佐药": ["桔梗", "牛蒡子", "竹叶", "芦根"], "使药": ["甘草"], "name": "银翘散", "notes": "### 银翘散的[[方剂总论#方剂成分的变化原则|成分变化]]\n- 发热重：石膏、知母\n- 伤津口渴严重：天花粉\n- 喉咙肿痛：山豆根、马勃、射干、板蓝根\n- 痈肿：蒲公英、紫花地丁"}, {"type": "方剂", "大类": "解表方", "子类": "辛凉解表", "组成": ["防风", "荆芥", "薄荷", "麻黄", "大黄", "芒硝", "连翘", "黄芩", "桔梗", "石膏", "栀子", "滑石", "当归", "川芎", "白芍", "白术", "甘草"], "君药": ["防风", "荆芥", "薄荷", "麻黄"], "臣药": ["大黄", "芒硝", "连翘", "黄芩", "桔梗", "石膏", "栀子", "滑石"], "佐药": ["当归", "川芎", "白芍", "白术"], "使药": ["甘草"], "name": "防风通圣散", "notes": ""}, {"type": "方剂", "大类": "清热方", "子类": "清虚热", "组成": ["青蒿", "鳖甲", "生地", "知母", "丹皮"], "君药": ["青蒿", "鳖甲"], "臣药": ["生地", "知母"], "佐药": ["丹皮"], "name": "青蒿鳖甲汤", "notes": ""}, {"type": "方剂", "大类": "清热方", "子类": "清热解暑", "组成": ["香薷", "黄芩", "黄连", "栀子", "连翘", "柴胡", "当归", "天花粉", "甘草", "蜂蜜"], "君药": ["香薷"], "臣药": ["黄芩", "黄连", "栀子", "连翘", "柴胡"], "佐药": ["当归", "天花粉"], "使药": ["甘草", "蜂蜜"], "name": "香薷散", "notes": ""}, {"type": "方剂", "大类": "化痰止咳平喘方", "子类": "清化热痰方", "组成": ["麻黄", "杏仁", "石膏", "甘草"], "君药": [], "臣药": [], "佐药": [], "使药": [], "name": "麻杏甘石汤", "notes": ""}, {"type": "方剂", "大类": "解表方", "子类": "辛温解表", "组成": ["麻黄", "桂枝", "杏仁", "甘草"], "君药": ["麻黄"], "臣药": ["桂枝"], "佐药": ["杏仁"], "使药": ["甘草"], "name": "麻黄汤", "notes": ""}, {"type": "方剂", "大类": "清热方", "子类": "清热解毒", "组成": ["黄连", "黄芩", "黄柏", "栀子"], "君药": ["黄连"], "臣药": ["黄芩"], "佐药": ["黄柏"], "使药": ["栀子"], "name": "黄连解毒汤", "notes": ""}];

        const container = document.getElementById('card-container');
        const filter = document.getElementById('category-filter');
        const stats = document.getElementById('stats');

        // Populate Filter
        const categories = [...new Set(fangjiData.map(item => item.大类).filter(Boolean))];
        categories.sort().forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            filter.appendChild(opt);
        });

        function renderCards(data) {
            container.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => card.classList.toggle('flipped');

                const inner = document.createElement('div');
                inner.className = 'card-inner';

                // Front
                const front = document.createElement('div');
                front.className = 'card-front';
                front.innerHTML = `
                    <div class="card-name">${item.name}</div>
                    <div class="card-type">${item.大类 || ''} - ${item.子类 || ''}</div>
                    <div style="font-size: 12px; color: #999; margin-top: 20px;">(点击翻面查看组成)</div>
                `;

                // Back
                const back = document.createElement('div');
                back.className = 'card-back';
                
                let compositionHtml = '';
                const roles = ['君药', '臣药', '佐药', '使药'];
                roles.forEach(role => {
                    const drugs = item[role];
                    if (drugs && Array.isArray(drugs) && drugs.length > 0 && drugs[0] !== null && drugs[0] !== '') {
                        compositionHtml += `<div class="card-label">${role}</div><div class="card-list">${drugs.join('、')}</div>`;
                    }
                });

                if (!compositionHtml && item.组成) {
                    compositionHtml += `<div class="card-label">组成</div><div class="card-list">${item.组成.join('、')}</div>`;
                }

                const notesHtml = item.notes ? `<div class="card-notes">${item.notes}</div>` : '';

                back.innerHTML = `
                    <div style="font-weight: bold; font-size: 18px; border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; margin-bottom: 10px;">${item.name}</div>
                    ${compositionHtml}
                    ${notesHtml}
                `;

                inner.appendChild(front);
                inner.appendChild(back);
                card.appendChild(inner);
                container.appendChild(card);
            });
            stats.textContent = `共 ${data.length} 个方剂`;
        }

        filter.onchange = (e) => {
            const val = e.target.value;
            const filtered = val === 'all' ? fangjiData : fangjiData.filter(item => item.大类 === val);
            renderCards(filtered);
        };

        // Initial render
        renderCards(fangjiData);
    </script>
</body>
</html>
