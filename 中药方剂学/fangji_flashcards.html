<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Liquid Prism Flashcards</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.35);
            --glass-border: rgba(255, 255, 255, 0.4);
            --text-main: #1d1d1f;
            --accent: #0071e3;
        }
        
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Icons", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #e2eafc 0%, #cfdef3 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Ambient Background */
        .ambient {
            position: absolute;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(0,113,227,0.15) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(60px);
        }
        .a1 { top: 5%; left: 5%; }
        .a2 { bottom: 5%; right: 5%; width: 50vw; height: 50vw; }

        /* Scene & Cube */
        .scene {
            width: 90vw;
            height: 75vh;
            max-width: 380px;
            max-height: 600px;
            perspective: 2000px;
            position: relative;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 35px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            padding: 45px 35px;
            overflow: hidden;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform-origin: center center;
        }

        /* Glossy Lighting */
        .face::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.05) 45%,
                rgba(255, 255, 255, 0.3) 50%,
                rgba(255, 255, 255, 0.05) 55%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(-10deg);
            pointer-events: none;
            z-index: 10;
        }

        .card-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            transform: translateZ(190px);
        }

        /* Face Positioning - Using a "square" prism logic to avoid gaps */
        /* Distance to center = width / 2 */
        .face-front  { transform: rotateY(0deg); }
        .face-back   { transform: rotateY(180deg); }
        .face-right  { transform: rotateY(90deg) translateZ(190px); }
        .face-left   { transform: rotateY(-90deg) translateZ(190px); }

        /* Typography & Layout */
        .content-front {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
        }

        .content-back {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            text-align: left;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        /* Custom scrollbar for glass */
        .content-back::-webkit-scrollbar { width: 4px; }
        .content-back::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        .name {
            font-size: 2.6rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            color: #1d1d1f;
            letter-spacing: -0.03em;
        }

        .sub-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 8px;
        }

        .reveal-hint {
            font-size: 0.65rem;
            color: rgba(0,0,0,0.2);
            letter-spacing: 0.3em;
            margin-top: 30px;
            text-transform: uppercase;
        }

        .role-group { margin-bottom: 22px; }
        .role-label {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 5px;
        }
        .role-content { font-size: 1.1rem; font-weight: 500; color: #333; }

        .notes {
            margin-top: auto;
            font-size: 0.85rem;
            line-height: 1.6;
            color: rgba(0,0,0,0.5);
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,0.06);
            font-style: italic;
        }

        /* Minimal Controls */
        .top-pill {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(15px);
            padding: 8px 18px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }
        
        select {
            background: transparent;
            border: none;
            outline: none;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-main);
            text-transform: uppercase;
            cursor: pointer;
        }

        .status {
            position: absolute;
            bottom: -60px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: rgba(0,0,0,0.25);
            letter-spacing: 0.2em;
        }
    </style>
</head>

    <div class="ambient a1"></div>

    <div class="scene">

            <select id="filter">

            </select>

        </div>

        <div id="cube" class="cube">
            <div id="card-wrapper" class="card-wrapper">
                <div id="f-front" class="face face-front"></div>
                <div id="f-back" class="face face-back"></div>
            </div>
            <div id="f-right" class="face face-right" style="opacity:0"></div>
            <div id="f-left" class="face face-left" style="opacity:0"></div>
        </div>

        <div class="status" id="status">0 / 0</div>
    </div>

                fLeft.style.opacity = "0";
                setTimeout(() => {
                    cube.style.transition = "transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)";
                    cardWrapper.style.transition = "transform 0.6s cubic-bezier(0.2, 0.8, 0.2, 1)";
                    busy = false;
                }, 50);
            }, 800);
        }

        function flip() {
            if (busy) return;
            flipped = !flipped;
            cardRotation += 180;
            cardWrapper.style.transform = `translateZ(190px) rotateY(${cardRotation}deg)`;
        }

        cardWrapper.onclick = flip;

        // Gestures
        let sX = 0;
        document.addEventListener('touchstart', e => sX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            const d = e.changedTouches[0].clientX - sX;
            if (Math.abs(d) > 60) navigate(d > 0 ? -1 : 1);
        });

        // Keys
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
            if (e.key === ' ' || e.key === 'Enter') flip();
        });

        filter.onchange = e => {
            const v = e.target.value;
            list = v === 'all' ? [...raw] : raw.filter(i => i.大类 === v);
            idx = 0; rotation = 0; cardRotation = 0; flipped = false; busy = false;
            cube.style.transform = "rotateY(0deg)";
            cardWrapper.style.transform = "translateZ(190px) rotateY(0deg)";
            update();
        };

        shuffle.onclick = () => {
            list.sort(() => Math.random() - 0.5);
            idx = 0; rotation = 0; cardRotation = 0; flipped = false; busy = false;
            cube.style.transform = "rotateY(0deg)";
            cardWrapper.style.transform = "translateZ(190px) rotateY(0deg)";
            update();
        };

        update();
    </script>
</body>
</html>
