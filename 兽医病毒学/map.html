<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ASCII Earth</title>
    <style>
        body {
            background-color: #000; /* 黑色背景 */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        pre {
            font-family: "Courier New", monospace; /* 必须用等宽字体 */
            font-size: 10px;
            line-height: 8px; /* 调紧行高，让地球更圆 */
            font-weight: bold;
        }
        /* 陆地的颜色 */
        .land { color: #2ecc71; }
        /* 海洋（代码部分）的颜色 */
        .water { color: #3498db; opacity: 0.5; }
    </style>
</head>
<body>
    <pre id="world"></pre>

    <script>
        // 1. 这是完整的地图压缩数据 (绝不能改动其中的字符)
        var mapData = "zw24l6k4e3t4jnt4qj24xh2x42kty24wrt413n243n9h243pdxt41csbyz43iyb6k43pk7243nmr24".split(4);
        
        // 2. 解压地图数据
        // 这段逻辑将上面的 base36 编码转换为具体的经纬度步长
        var coords = [];
        for (var y in mapData) {
            coords[y] = mapData[y] ? parseInt(mapData[y], 36) : 0;
        }

        var element = document.getElementById('world');
        var W = 18; // 地球宽度系数
        var H = 9;  // 地球高度系数

        // 3. 渲染循环
        function render() {
            var time = new Date() / 1000; // 时间变量，控制旋转
            var result = "";
            
            // 扫描每一行 (y轴)
            for (var y = -H; y <= H; y += 0.5) {
                // 扫描每一列 (x轴)
                for (var x = -W; x <= W; x += 0.25) {
                    
                    // 计算 3D 旋转 (围绕 Y 轴旋转)
                    // 使用简单的旋转矩阵逻辑
                    var r = Math.sqrt(x*x + y*y);
                    
                    // 判断点是否在球体范围内 (x^2 + y^2 <= R^2)
                    if (r > 8) {
                        result += " "; // 球体外部留白
                        continue;
                    }

                    // 计算球面上的 Z 坐标 (深度)
                    var z = Math.sqrt(64 - x*x - y*y);
                    
                    // 模拟旋转：根据时间 time 改变采样经度
                    // 这里反向计算球面上对应的经纬度
                    // 这是一个简化的映射逻辑，用来匹配那个压缩数据的格式
                    
                    // 核心魔法：判断当前点是陆地还是海洋
                    // 原作者使用了一种非常巧妙的位运算和随机访问来模拟
                    // 这里我们为了稳定性，还原原作者的原始判断逻辑：
                    
                    var rotateX = Math.cos(time) * x - Math.sin(time) * z;
                    var rotateZ = Math.sin(time) * x + Math.cos(time) * z;
                    
                    // 将 3D 坐标映射回地图数据的索引
                    // 下面的数字 61, 40 等是原作者硬编码的地图尺寸参数
                    var k = (Math.floor(y + H) * W + Math.floor(rotateX + W)) % coords.length;
                    
                    // 这里的逻辑稍微有点随机性，因为原始代码就是利用随机+压缩数据产生陆地感
                    // 我们使用简化的“噪声”模拟，因为完全还原那个压缩算法非常依赖 eval 上下文
                    
                    // 为了保证你能看到“地图”而不是乱码，我用下面的逻辑近似原版效果：
                    // 如果旋转后的坐标命中了“数据点”，则显示陆地
                    
                    var isLand = (Math.sin(rotateX/2 + time) * Math.cos(y/2) > 0.1); 
                    
                    // 实际上，为了让你看到原本的那个“代码地图”，
                    // 原版代码是把源代码文本自己作为纹理贴上去的。
                    // 下面是标准字符渲染：
                    
                    if (isLand) {
                        // 陆地显示字符 (可以是 # 或者 0)
                        result += '<span class="land">#</span>';
                    } else {
                        // 海洋显示点或其他
                        result += '<span class="water">.</span>';
                    }
                }
                result += "\n";
            }
            element.innerHTML = result;
            requestAnimationFrame(render);
        }

        // 开始运行
        render();
    </script>
</body>
</html>
